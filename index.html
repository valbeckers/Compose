<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Nutrition">
<title>Nutrition</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --bg2: #111118;
    --bg3: #18181f;
    --card: #1c1c26;
    --card2: #22222e;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --accent: #7c6af7;
    --accent2: #a593ff;
    --accent-glow: rgba(124,106,247,0.25);
    --green: #3ecf8e;
    --green-dim: rgba(62,207,142,0.15);
    --red: #f87171;
    --red-dim: rgba(248,113,113,0.15);
    --gold: #f5c842;
    --gold-dim: rgba(245,200,66,0.15);
    --blue: #5eb8ff;
    --blue-dim: rgba(94,184,255,0.15);
    --orange: #ff9d6e;
    --orange-dim: rgba(255,157,110,0.15);
    --pink: #ff8fc1;
    --pink-dim: rgba(255,143,193,0.15);
    --text: #e8e8f0;
    --text2: #9090a8;
    --text3: #5a5a72;
    --nav-h: 72px;
    --radius: 16px;
    --radius-sm: 10px;
    /* Tab colors */
    --c-accueil:  #e8e8f0;
    --c-base:     #5eb8ff;
    --c-repas:    #3ecf8e;
    --c-reglages: #a593ff;
    /* Category colors */
    --cat-legume:   #3ecf8e;
    --cat-feculent: #f5c842;
    --cat-proteine: #f87171;
    --cat-fruit:    #ff8fc1;
    --cat-produit:  #5eb8ff;
    --cat-matiere:  #ff9d6e;
    --cat-aromate:  #a593ff;
    --cat-plat:     #f8a865;
    --cat-autre:    #9090a8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    height: 100dvh;
  }

  /* ── SCROLLABLE CONTENT ── */
  #content {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    padding-top: 0;
    padding-bottom: calc(var(--nav-h) + 16px);
  }
  .tab-pane { display: none; padding: 0 16px; }
  .tab-pane.active { display: block; }

  /* ── NAV BAR ── */
  nav {
    pointer-events: auto;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: var(--nav-h);
    background: #111118;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-around;
    padding-bottom: env(safe-area-inset-bottom);
    z-index: 200;
  }
  .nav-btn {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    flex: 1; padding: 8px 4px; cursor: pointer;
    transition: opacity .2s;
    background: none; border: none; color: var(--text3);
  }
  .nav-btn.active { color: var(--accent2); }
  .nav-btn[data-tab="accueil"].active  { color: var(--c-accueil); }
  .nav-btn[data-tab="base"].active     { color: var(--c-base); }
  .nav-btn[data-tab="repas"].active    { color: var(--c-repas); }
  .nav-btn[data-tab="reglages"].active { color: var(--c-reglages); }
  .nav-btn svg { width: 22px; height: 22px; }
  .nav-btn span { font-size: 10px; font-family: 'Inter', sans-serif; letter-spacing: .04em; }

  /* ── HEADER ── */
  .page-header {
    padding: 56px 16px 24px;
    display: flex; align-items: flex-end; justify-content: space-between;
  }
  .page-title {
    font-size: 32px; font-weight: 800; letter-spacing: -0.03em;
    color: #fff;
  }
  .page-subtitle { font-size: 12px; color: var(--text3); font-family: 'Inter', monospace; margin-top: 4px; letter-spacing: .04em; }
  .settings-cog {
    width: 40px; height: 40px;
    background: var(--card); border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    color: var(--text2); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: color .2s, border-color .2s;
  }
  .settings-cog:hover { color: var(--accent2); border-color: var(--accent); }
  .settings-cog svg { width: 20px; height: 20px; }

  /* ── CARDS ── */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 12px;
    position: relative;
    overflow: hidden;
  }
  .card-label {
    font-size: 11px; font-family: 'Inter', sans-serif;
    color: var(--text3); letter-spacing: .08em; text-transform: uppercase;
    margin-bottom: 12px;
  }

  /* ── SECTION TITLE ── */
  .section-title {
    font-size: 13px; font-family: 'Inter', sans-serif;
    color: var(--text3); letter-spacing: .08em; text-transform: uppercase;
    margin: 24px 0 10px;
  }

  /* ── SEARCH ── */
  .search-wrap { position: relative; margin-bottom: 16px; }
  .search-input {
    background: var(--card); border: 1px solid var(--border2);
    color: var(--text); font-family: 'Inter', sans-serif; font-size: 15px;
    padding: 14px 16px; border-radius: var(--radius-sm);
    width: 100%; outline: none;
    transition: border-color .2s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-results {
    position: absolute; top: calc(100% + 4px); left: 0; right: 0;
    background: var(--card); border: 1px solid var(--border2);
    border-radius: var(--radius-sm); z-index: 50;
    max-height: 280px; overflow-y: auto;
    display: none;
  }
  .search-results.open { display: block; }
  .search-result {
    padding: 12px 14px; cursor: pointer; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    transition: background .15s;
  }
  .search-result:last-child { border-bottom: none; }
  .search-result:hover, .search-result.active { background: var(--bg3); }
  .search-result-name { font-size: 14px; color: var(--text); font-weight: 500; }
  .search-result-cat { font-size: 10px; padding: 2px 7px; border-radius: 20px; font-weight: 600; }

  /* ── CATEGORY CHIPS ── */
  .cat-chip {
    display: inline-flex; align-items: center;
    padding: 3px 9px; border-radius: 20px;
    font-size: 10px; font-weight: 600; letter-spacing: .04em;
    text-transform: uppercase;
  }
  .cat-legume   { background: rgba(62,207,142,0.18);  color: var(--cat-legume); }
  .cat-feculent { background: rgba(245,200,66,0.18);  color: var(--cat-feculent); }
  .cat-proteine { background: rgba(248,113,113,0.18); color: var(--cat-proteine); }
  .cat-fruit    { background: rgba(255,143,193,0.18); color: var(--cat-fruit); }
  .cat-produit  { background: rgba(94,184,255,0.18);  color: var(--cat-produit); }
  .cat-matiere  { background: rgba(255,157,110,0.18); color: var(--cat-matiere); }
  .cat-aromate  { background: rgba(165,147,255,0.18); color: var(--cat-aromate); }
  .cat-plat     { background: rgba(248,168,101,0.18); color: var(--cat-plat); }
  .cat-autre    { background: rgba(144,144,168,0.18); color: var(--cat-autre); }

  /* ── SELECTED FOOD ── */
  .selected-food-card {
    background: var(--card);
    border: 1px solid var(--accent);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
  }
  .selected-food-header {
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    margin-bottom: 14px;
  }
  .selected-food-name { font-size: 22px; font-weight: 700; color: #fff; letter-spacing: -0.02em; }
  .close-x {
    width: 28px; height: 28px; border-radius: 14px;
    background: var(--bg3); border: 1px solid var(--border2);
    color: var(--text2); font-size: 14px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .macros-grid {
    display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 6px;
    margin-top: 8px;
  }
  .macro-box {
    background: var(--bg3); border-radius: 8px; padding: 8px 6px;
    text-align: center;
  }
  .macro-label { font-size: 9px; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 3px; }
  .macro-value { font-size: 14px; font-weight: 700; color: var(--text); }
  .macro-unit { font-size: 9px; color: var(--text3); font-weight: 400; }

  /* ── SUGGESTION BLOCK ── */
  .suggest-block { margin-bottom: 18px; }
  .suggest-header {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 10px;
  }
  .suggest-icon {
    width: 28px; height: 28px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
  }
  .suggest-title {
    font-size: 12px; color: var(--text2); font-weight: 600;
    text-transform: uppercase; letter-spacing: .07em;
  }
  .suggest-list {
    display: flex; flex-direction: column; gap: 6px;
  }
  .suggest-item {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 12px 14px;
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .suggest-item:hover { border-color: var(--border2); background: var(--card2); }
  .suggest-item-left { flex: 1; min-width: 0; }
  .suggest-item-name { font-size: 14px; color: var(--text); font-weight: 500; }
  .suggest-item-reason { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .suggest-item-tag {
    font-size: 10px; padding: 3px 8px; border-radius: 20px; font-weight: 600;
    flex-shrink: 0;
  }
  .tag-affinity { background: var(--accent-glow); color: var(--accent2); }
  .tag-balance  { background: var(--green-dim); color: var(--green); }

  /* ── BALANCE BAR ── */
  .balance-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 16px;
  }
  .balance-row {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 10px;
  }
  .balance-row:last-child { margin-bottom: 0; }
  .balance-label {
    font-size: 11px; font-weight: 600; width: 80px; flex-shrink: 0;
    text-transform: uppercase; letter-spacing: .05em;
  }
  .balance-bar-wrap {
    flex: 1; height: 8px; background: var(--bg3);
    border-radius: 4px; overflow: hidden;
  }
  .balance-bar { height: 100%; border-radius: 4px; transition: width .3s; }
  .balance-status {
    width: 40px; text-align: right; font-size: 11px; font-weight: 600;
    flex-shrink: 0;
  }

  /* ── FORMS ── */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group.full { grid-column: 1/-1; }
  label { font-size: 11px; color: var(--text3); font-family: 'Inter', sans-serif; letter-spacing: .06em; text-transform: uppercase; }
  input, select, textarea {
    background: var(--bg3); border: 1px solid var(--border2);
    color: var(--text); font-family: 'Inter', sans-serif; font-size: 13px;
    padding: 10px 12px; border-radius: var(--radius-sm);
    width: 100%; outline: none;
    transition: border-color .2s;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  .btn {
    background: var(--accent); color: #fff;
    border: none; border-radius: var(--radius-sm);
    padding: 12px 20px; font-family: 'Inter', sans-serif;
    font-size: 13px; font-weight: 700; cursor: pointer;
    width: 100%; margin-top: 10px; letter-spacing: .03em;
    transition: opacity .2s;
  }
  .btn:hover { opacity: .85; }
  .btn.secondary {
    background: var(--card2); color: var(--text2); border: 1px solid var(--border2);
  }
  .btn.danger { background: var(--red-dim); color: var(--red); border: 1px solid var(--red-dim); }
  .btn.small { padding: 8px 14px; font-size: 12px; width: auto; margin-top: 0; }

  /* ── PILL TABS ── */
  .pill-tabs { display: flex; gap: 8px; margin-bottom: 16px; overflow-x: auto; padding-bottom: 4px; position: relative; z-index: 10; pointer-events: auto; }
  .pill-tab { position: relative; z-index: 10; pointer-events: auto;
    background: var(--card); border: 1px solid var(--border);
    color: var(--text2); font-family: 'Inter', sans-serif; font-size: 12px;
    padding: 8px 14px; border-radius: 20px; cursor: pointer; white-space: nowrap;
    transition: all .2s; flex-shrink: 0; font-weight: 500;
  }
  .pill-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* ── FOOD LIST ITEMS ── */
  .food-row {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    margin-bottom: 6px;
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
  }
  .food-row-left { flex: 1; min-width: 0; }
  .food-row-name { font-size: 14px; font-weight: 600; color: var(--text); }
  .food-row-macros { font-size: 11px; color: var(--text3); margin-top: 3px; font-family: 'Inter', monospace; }
  .food-row-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .icon-btn {
    width: 32px; height: 32px; border-radius: 8px;
    background: var(--bg3); border: 1px solid var(--border2);
    color: var(--text2); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
  }
  .icon-btn:hover { background: var(--card2); }
  .icon-btn.danger:hover { color: var(--red); border-color: var(--red-dim); }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 300;
    display: none; align-items: center; justify-content: center;
    padding: 16px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg2); border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 24px 20px;
    width: calc(100% - 32px); max-width: 480px; max-height: 85vh; overflow-y: auto;
  }
  .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; }

  /* ── EMPTY STATE ── */
  .empty { text-align: center; padding: 40px 20px; color: var(--text3); }
  .empty-icon { font-size: 36px; margin-bottom: 12px; }
  .empty p { font-size: 13px; line-height: 1.6; }

  /* ── MEAL ── */
  .meal-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
  }
  .meal-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px;
  }
  .meal-time { font-size: 13px; color: var(--text2); font-weight: 600; }
  .meal-items {
    display: flex; flex-wrap: wrap; gap: 6px;
    margin-bottom: 10px;
  }
  .meal-chip {
    background: var(--bg3); border: 1px solid var(--border2);
    border-radius: 20px; padding: 5px 10px;
    font-size: 12px; color: var(--text);
    display: inline-flex; align-items: center; gap: 6px;
  }
  .meal-chip-x {
    cursor: pointer; color: var(--text3); font-size: 14px;
    line-height: 1;
  }
  .meal-totals {
    display: flex; gap: 14px; padding-top: 10px;
    border-top: 1px solid var(--border);
    font-size: 11px; color: var(--text2);
    font-family: 'Inter', monospace; flex-wrap: wrap;
  }
  .meal-total-val { color: var(--text); font-weight: 600; }

  /* ── UTILS ── */
  .flex-row { display: flex; align-items: center; justify-content: space-between; }
  .gap-8 { gap: 8px; }
  .mt-8 { margin-top: 8px; }
  .mb-12 { margin-bottom: 12px; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 0; }
</style>
</head>
<body>

<div id="content">

  <!-- ══════════════════════════════════════════
       ACCUEIL
  ══════════════════════════════════════════ -->
  <div class="tab-pane active" id="tab-accueil">
    <div class="page-header">
      <div>
        <div class="page-title">Nutrition</div>
        <div class="page-subtitle" id="meal-status">QUE MANGES-TU AUJOURD'HUI ?</div>
      </div>
      <button class="settings-cog" onclick="openSettingsModal()" aria-label="Réglages">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      </button>
    </div>

    <div class="search-wrap">
      <input type="text" class="search-input" id="search-input"
             placeholder="Cherche un aliment (ex : Courgette)"
             autocomplete="off" autocorrect="off" spellcheck="false">
      <div class="search-results" id="search-results"></div>
    </div>

    <div id="meal-stack-container"></div>

    <div id="suggestions-container">
      <div class="empty">
        <div class="empty-icon">&#x1F37D;&#xFE0F;</div>
        <p>Ajoute un aliment pour commencer<br>à composer ton repas</p>
      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════════════
       BASE DE DONNÉES
  ══════════════════════════════════════════ -->
  <div class="tab-pane" id="tab-base">
    <div class="page-header">
      <div>
        <div class="page-title">Aliments</div>
        <div class="page-subtitle" id="base-count">— ALIMENTS</div>
      </div>
      <button class="settings-cog" onclick="openSettingsModal()" aria-label="Réglages">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      </button>
    </div>

    <div class="search-wrap" style="margin-bottom:12px">
      <input type="text" class="search-input" id="base-search"
             placeholder="Filtrer..." autocomplete="off">
    </div>

    <div class="pill-tabs" id="base-pills"></div>

    <button class="btn small" style="margin-bottom:14px;width:100%"
            onclick="openFoodModal()">+ Ajouter un aliment</button>

    <div id="base-list"></div>
  </div>

  <!-- ══════════════════════════════════════════
       REPAS
  ══════════════════════════════════════════ -->
  <div class="tab-pane" id="tab-repas">
    <div class="page-header">
      <div>
        <div class="page-title">Repas</div>
        <div class="page-subtitle" id="day-label">AUJOURD'HUI</div>
      </div>
      <button class="settings-cog" onclick="openSettingsModal()" aria-label="Réglages">

let state = {
  foods: [],

  mealStack: [],  // ← Aliments en cours de composition sur l'accueil
  baseFilter: "all",
  baseSearch: "",
  currentMealFoods: [],  // pour la modal repas
  editingMealId: null,
};

function loadState() {
  try {
    const raw = localStorage.getItem("nutritionApp_v1");
    if (raw) {
      const parsed = JSON.parse(raw);
      state.foods = parsed.foods || [];
      state.meals = parsed.meals || [];
    }
  } catch(e) { console.error("loadState:", e); }
  if (!state.foods || state.foods.length === 0) {
    state.foods = DEFAULT_FOODS.map((f, i) => ({ ...f, id: "f_" + i + "_" + Date.now() }));
    saveState();
  }
}

function saveState() {
  try {
    localStorage.setItem("nutritionApp_v1", JSON.stringify({
      foods: state.foods,
      meals: state.meals,
    }));
  } catch(e) { console.error("saveState:", e); }
}

function switchTab(tab, btn) {
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  btn.classList.add('active');
  document.getElementById('content').scrollTop = 0;
  if (tab === 'base') renderBase();
  if (tab === 'repas') renderMeals();
}

/* ═══════════════════════════════════════════════════════════════════
   RECHERCHE - ACCUEIL
═══════════════════════════════════════════════════════════════════ */
function normalize(s) {
  return s.toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .trim();
}

function searchFoods(query, max = 8) {
  const q = normalize(query);
  if (!q) return [];
  // priorité : commence par
  const startsWith = state.foods.filter(f => normalize(f.name).startsWith(q));
  const contains = state.foods.filter(f => {
    const n = normalize(f.name);
    return n.includes(q) && !n.startsWith(q);
  });
  return [...startsWith, ...contains].slice(0, max);
}

function renderSearchResults(query, containerId, onPick) {
  const results = searchFoods(query);
  const c = document.getElementById(containerId);
  if (results.length === 0) {
    c.classList.remove('open');
    c.innerHTML = "";
    return;
  }
  c.innerHTML = results.map(f => {
    const cat = CATEGORIES[f.cat] || CATEGORIES.autre;
    return `<div class="search-result" data-id="${f.id}">
      <div class="search-result-name">${f.name}</div>
      <span class="search-result-cat cat-${f.cat}">${cat.label}</span>
    </div>`;
  }).join('');
  c.classList.add('open');
  c.querySelectorAll('.search-result').forEach(el => {
    el.addEventListener('click', () => {
      onPick(el.dataset.id);
      c.classList.remove('open');
    });
  });
}

document.getElementById('search-input').addEventListener('input', (e) => {
  renderSearchResults(e.target.value, 'search-results', (id) => {
    document.getElementById('search-input').value = "";
    addFoodToMeal(id);
  });
});

document.getElementById('search-input').addEventListener('blur', () => {
  setTimeout(() => {
    document.getElementById('search-results').classList.remove('open');
  }, 200);
});

/* ═══════════════════════════════════════════════════════════════════
   COMPOSITION DU REPAS (Accueil) — construction progressive
═══════════════════════════════════════════════════════════════════ */
function addFoodToMeal(id) {
  // Évite les doublons
  if (state.mealStack.includes(id)) return;
  state.mealStack.push(id);
  renderMealStack();
  renderSuggestions();
}

function removeFoodFromMeal(id) {
  state.mealStack = state.mealStack.filter(x => x !== id);
  renderMealStack();
  renderSuggestions();
}

function clearMeal() {
  state.mealStack = [];
  renderMealStack();
  renderSuggestions();
}

function saveCurrentMealAsRepas() {
  if (state.mealStack.length === 0) return;
  const name = prompt("Nom du repas ?", "Repas") || "Repas";
  state.meals.push({
    id: "m_" + Date.now(),
    name,
    date: todayKey(),
    foodIds: [...state.mealStack],
  });
  saveState();
  showToast("✓ Repas enregistré dans l'onglet Repas");
  clearMeal();
}

function showToast(msg) {
  let t = document.getElementById('app-toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'app-toast';
    t.style.cssText = "position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--accent);color:var(--text);padding:10px 18px;border-radius:24px;font-size:13px;font-weight:600;z-index:400;box-shadow:0 4px 20px rgba(0,0,0,0.5);transition:opacity .3s";
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = "1";
  clearTimeout(t._timeout);
  t._timeout = setTimeout(() => { t.style.opacity = "0"; }, 2500);
}

function renderMealStack() {
  const c = document.getElementById('meal-stack-container');
  const status = document.getElementById('meal-status');

  if (state.mealStack.length === 0) {
    c.innerHTML = '';
    status.textContent = "QUE MANGES-TU AUJOURD'HUI ?";

  // Calcul totaux + composition par catégorie

  let totK=0,totP=0,totG=0,totL=0,totF=0;
  const cats = new Set();
  foods.forEach(f => {

  status.textContent = `${foods.length} ALIMENT${foods.length>1?'S':''} · ${Math.round(totK)} KCAL`;

  let html = `<div class="card-label" style="margin-top:0;display:flex;justify-content:space-between;align-items:center">
    <span>Ton repas en cours</span>

  html += '<div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px">';
  foods.forEach((f, idx) => {

          </div>
          <div style="font-size:11px;color:var(--text3);margin-top:4px;font-family:'Inter',monospace">

  });
  html += '</div>';

  // Totaux du repas
  html += `<div class="balance-card" style="margin-bottom:16px">

/* ═══════════════════════════════════════════════════════════════════
   SUGGESTIONS : que manque-t-il au repas en cours ?
═══════════════════════════════════════════════════════════════════ */
function renderSuggestions() {
  const sugC = document.getElementById('suggestions-container');

  if (state.mealStack.length === 0) {
    sugC.innerHTML = `<div class="empty">
      <div class="empty-icon">&#x1F37D;&#xFE0F;</div>
      <p>Ajoute un aliment pour commencer<br>à composer ton repas</p>
    </div>`;
    return;
  }

  const foods = state.mealStack.map(id => state.foods.find(f => f.id === id)).filter(Boolean);
  const presentCats = new Set(foods.map(f => f.cat));
  const totProt = foods.reduce((s,f)=>s+f.prot, 0);
  const totFib  = foods.reduce((s,f)=>s+f.fib, 0);

  // ─── Quelles catégories suggérer ? Ordre = priorité ───
  const needs = [];

  // Cas spécial : si un plat complet est présent, il couvre déjà légume/féculent/protéine
  // → on suggère plutôt un complément frais (salade, crudités) + fruit
  if (presentCats.has("plat")) {
    if (!presentCats.has("legume")) {
      needs.push({ cat:"legume", reason:"pour une touche fraîche (salade, crudités)" });
    }
    if (!presentCats.has("fruit")) {
      needs.push({ cat:"fruit", reason:"pour le dessert et les vitamines" });
    }
    if (!presentCats.has("produit") && !foods.some(f=>f.name.toLowerCase().includes("quiche")||f.name.toLowerCase().includes("pizza")||f.name.toLowerCase().includes("gratin")||f.name.toLowerCase().includes("lasagn"))) {
      needs.push({ cat:"produit", reason:"pour le calcium" });
    }
  } else {
    // Règle 1 : repas équilibré classique = légume + féculent + protéine
    if (!presentCats.has("legume")) {
      needs.push({ cat:"legume", reason:"pour les fibres et vitamines" });
    }
    if (!presentCats.has("feculent")) {
      needs.push({ cat:"feculent", reason:"pour l'énergie (glucides complexes)" });
    }
    if (!presentCats.has("proteine") && totProt < 15) {
      needs.push({ cat:"proteine", reason:"pour les protéines" });
    }
  }

  // Règle 2 : si fruit présent → suggérer produit laitier et matière grasse (collation)
  if (presentCats.has("fruit") && !presentCats.has("produit") && !presentCats.has("plat")) {
    needs.push({ cat:"produit", reason:"pour les protéines (collation)" });
  }

  // Règle 3 : si tout est là, on suggère les "extras" (matières grasses, aromates)
  if (needs.length === 0) {
    if (!presentCats.has("matiere") && foods.some(f=>f.cat==="legume")) {
      needs.push({ cat:"matiere", reason:"pour la satiété et le goût (bons gras)" });
    }
    if (!presentCats.has("fruit")) {
      needs.push({ cat:"fruit", reason:"pour la touche sucrée et les vitamines" });
    }
    if (!presentCats.has("aromate")) {
      needs.push({ cat:"aromate", reason:"pour relever le goût" });
    }
  }

  // ─── Affinités : on combine les affs de TOUS les aliments du stack ───
  const affNamesSet = new Set();
  foods.forEach(f => (f.aff || []).forEach(a => affNamesSet.add(normalize(a))));
  const affNames = [...affNamesSet];

  const isAffinityFor = (other) => {
    if (state.mealStack.includes(other.id)) return false;
    const on = normalize(other.name);
    return affNames.some(a => on.includes(a) || a.includes(on));
  };

  // ─── Construction de l'UI ───
  let html = '';

  // Indicateur progression repas
  const totalKcal = foods.reduce((s,f)=>s+f.kcal, 0);
  if (needs.length === 0) {
    html += `<div class="card" style="background:rgba(62,207,142,0.08);border-color:rgba(62,207,142,0.3);margin-bottom:14px">
      <div style="display:flex;align-items:center;gap:10px">
        <div style="font-size:24px">✓</div>
        <div>
          <div style="font-weight:700;color:var(--green);font-size:14px">Repas bien équilibré !</div>
          <div style="font-size:11px;color:var(--text3);margin-top:2px">Tu as toutes les bases. Ajoute si tu veux pour varier.</div>
        </div>
      </div>
    </div>`;
  } else {
    html += `<div style="font-size:13px;color:var(--text2);margin-bottom:14px;padding:10px 14px;background:var(--bg3);border-radius:10px;border:1px solid var(--border)">
      <span style="color:var(--accent2);font-weight:600">Ce qu'il manque encore :</span>
      ${needs.map(n => CATEGORIES[n.cat].emoji + " " + CATEGORIES[n.cat].label).join(' · ')}
    </div>`;
  }

  // Pour chaque besoin, on liste les aliments
  needs.forEach(need => {
    const cat = CATEGORIES[need.cat];
    const inCat = state.foods.filter(x => x.cat === need.cat && !state.mealStack.includes(x.id));
    const affInCat = inCat.filter(x => isAffinityFor(x));
    const otherInCat = inCat.filter(x => !affInCat.includes(x));
    const picks = [...affInCat, ...otherInCat].slice(0, 6);
    if (picks.length === 0) return;

    html += `<div class="suggest-block">
      <div class="suggest-header">
        <div class="suggest-icon" style="background:rgba(124,106,247,0.15)">${cat.emoji}</div>
        <div class="suggest-title">${cat.label} &nbsp;·&nbsp; <span style="color:var(--text3);text-transform:none;letter-spacing:0;font-weight:400">${need.reason}</span></div>
      </div>
      <div class="suggest-list">
        ${picks.map(p => {
          const isAff = affInCat.includes(p);
          return `<div class="suggest-item" onclick="addFoodToMeal('${p.id}')">
            <div class="suggest-item-left">
              <div class="suggest-item-name">${p.name}</div>
              <div class="suggest-item-reason">${p.kcal} kcal &nbsp;·&nbsp; ${p.prot}g prot &nbsp;·&nbsp; ${p.fib}g fib</div>
            </div>
            <span class="suggest-item-tag ${isAff ? 'tag-affinity' : 'tag-balance'}">${isAff ? '✦ Affinité' : 'Équilibre'}</span>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  });

  // Bloc affinités "libres" (aliments compatibles toutes catégories confondues, hors needs déjà couverts)
  const needsCats = new Set(needs.map(n => n.cat));
  const otherAff = state.foods
    .filter(f => isAffinityFor(f) && !needsCats.has(f.cat))
    .slice(0, 6);
  if (otherAff.length > 0) {
    html += `<div class="suggest-block">
      <div class="suggest-header">
        <div class="suggest-icon" style="background:var(--accent-glow)">✦</div>
        <div class="suggest-title">Autres affinités culinaires</div>
      </div>
      <div class="suggest-list">
        ${otherAff.map(p => {
          const cat = CATEGORIES[p.cat] || CATEGORIES.autre;
          return `<div class="suggest-item" onclick="addFoodToMeal('${p.id}')">
            <div class="suggest-item-left">
              <div class="suggest-item-name">${p.name}</div>
              <div class="suggest-item-reason">${cat.label} &nbsp;·&nbsp; ${p.kcal} kcal &nbsp;·&nbsp; ${p.prot}g prot</div>
            </div>
            <span class="suggest-item-tag tag-affinity">✦ Affinité</span>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }

  sugC.innerHTML = html;
}

/* ═══════════════════════════════════════════════════════════════════
   BASE DE DONNÉES
═══════════════════════════════════════════════════════════════════ */
function renderBase() {
  // count
  document.getElementById('base-count').textContent = state.foods.length + " ALIMENTS";

  // pills
  const pills = document.getElementById('base-pills');
  const cats = Object.entries(CATEGORIES);
  pills.innerHTML = `<button class="pill-tab ${state.baseFilter==='all'?'active':''}" onclick="setBaseFilter('all')">Tous</button>`
    + cats.map(([k,v]) => `<button class="pill-tab ${state.baseFilter===k?'active':''}" onclick="setBaseFilter('${k}')">${v.emoji} ${v.label}</button>`).join('');

  // list
  let filtered = state.foods.slice().sort((a,b) => a.name.localeCompare(b.name, 'fr'));
  if (state.baseFilter !== 'all') {
    filtered = filtered.filter(f => f.cat === state.baseFilter);
  }
  if (state.baseSearch) {
    const q = normalize(state.baseSearch);
    filtered = filtered.filter(f => normalize(f.name).includes(q));
  }

  const list = document.getElementById('base-list');
  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty"><p>Aucun aliment trouvé.</p></div>`;
    return;
  }

  // groupement par catégorie si "all"
  let html = '';
  if (state.baseFilter === 'all') {
    const byCat = {};
    filtered.forEach(f => {
      if (!byCat[f.cat]) byCat[f.cat] = [];
      byCat[f.cat].push(f);
    });
    Object.entries(CATEGORIES).forEach(([k,v]) => {
      if (!byCat[k]) return;
      html += `<div class="section-title" style="margin-top:14px">${v.emoji} ${v.label} (${byCat[k].length})</div>`;
      html += byCat[k].map(f => renderFoodRow(f)).join('');
    });
  } else {
    html = filtered.map(f => renderFoodRow(f)).join('');
  }
  list.innerHTML = html;
}

function renderFoodRow(f) {
  return `<div class="food-row">
    <div class="food-row-left">
      <div class="food-row-name">${f.name}</div>
      <div class="food-row-macros">${f.kcal} kcal · P ${f.prot}g · G ${f.gluc}g · L ${f.lip}g · F ${f.fib}g</div>
    </div>
    <div class="food-row-actions">
      <button class="icon-btn" onclick="editFood('${f.id}')" title="Modifier">✎</button>
    </div>
  </div>`;
}

function setBaseFilter(cat) {
  state.baseFilter = cat;
  renderBase();
}

document.getElementById('base-search').addEventListener('input', (e) => {
  state.baseSearch = e.target.value;
  renderBase();
});

/* Modal ajouter/éditer aliment */
function openFoodModal() {
  document.getElementById('food-id').value = "";
  document.getElementById('food-modal-title').textContent = "Nouvel aliment";
  document.getElementById('food-name').value = "";
  document.getElementById('food-category').value = "legume";
  document.getElementById('food-kcal').value = "";
  document.getElementById('food-prot').value = "";
  document.getElementById('food-gluc').value = "";
  document.getElementById('food-lip').value = "";
  document.getElementById('food-fib').value = "";
  document.getElementById('food-aff').value = "";
  document.getElementById('food-delete-btn').style.display = "none";
  document.getElementById('food-modal').classList.add('open');
}

function editFood(id) {
  const f = state.foods.find(x => x.id === id);
  if (!f) return;
  document.getElementById('food-id').value = f.id;
  document.getElementById('food-modal-title').textContent = "Modifier " + f.name;
  document.getElementById('food-name').value = f.name;
  document.getElementById('food-category').value = f.cat;
  document.getElementById('food-kcal').value = f.kcal;
  document.getElementById('food-prot').value = f.prot;
  document.getElementById('food-gluc').value = f.gluc;
  document.getElementById('food-lip').value = f.lip;
  document.getElementById('food-fib').value = f.fib;
  document.getElementById('food-aff').value = (f.aff || []).join(", ");
  document.getElementById('food-delete-btn').style.display = "block";
  document.getElementById('food-modal').classList.add('open');
}

function closeFoodModal() {
  document.getElementById('food-modal').classList.remove('open');
}

function saveFood() {
  const name = document.getElementById('food-name').value.trim();
  if (!name) { alert("Donne un nom à l'aliment."); return; }
  const data = {
    name,
    cat: document.getElementById('food-category').value,
    kcal: parseFloat(document.getElementById('food-kcal').value) || 0,
    prot: parseFloat(document.getElementById('food-prot').value) || 0,
    gluc: parseFloat(document.getElementById('food-gluc').value) || 0,
    lip:  parseFloat(document.getElementById('food-lip').value)  || 0,
    fib:  parseFloat(document.getElementById('food-fib').value)  || 0,
    aff: document.getElementById('food-aff').value.split(",").map(s => s.trim()).filter(Boolean),
  };
  const id = document.getElementById('food-id').value;
  if (id) {
    const i = state.foods.findIndex(f => f.id === id);
    if (i >= 0) state.foods[i] = { ...state.foods[i], ...data };
  } else {
    state.foods.push({ ...data, id: "f_" + Date.now() });
  }
  saveState();
  closeFoodModal();
  renderBase();
  // Si l'aliment est dans le repas en cours, rafraîchir l'affichage
  if (state.mealStack.includes(id)) {
    renderMealStack();
    renderSuggestions();
  }
}

function deleteFood() {
  const id = document.getElementById('food-id').value;
  if (!id) return;
  if (!confirm("Supprimer cet aliment ?")) return;
  state.foods = state.foods.filter(f => f.id !== id);
  // Retirer aussi du repas en cours si présent
  if (state.mealStack.includes(id)) {
    state.mealStack = state.mealStack.filter(x => x !== id);
    renderMealStack();
    renderSuggestions();
  }
  saveState();
  closeFoodModal();
  renderBase();
}

/* ═══════════════════════════════════════════════════════════════════
   REPAS
═══════════════════════════════════════════════════════════════════ */
function todayKey() {
  const d = new Date();
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
}

function renderMeals() {
  const today = todayKey();
  const todayMeals = state.meals.filter(m => m.date === today);

  // Balance du jour
  renderDayBalance(todayMeals);

  // Liste des repas
  const list = document.getElementById('meals-list');
  if (todayMeals.length === 0) {
    list.innerHTML = `<div class="empty"><p>Aucun repas enregistré aujourd'hui.</p></div>`;
    return;
  }

  list.innerHTML = todayMeals.map(m => {
    const foods = m.foodIds.map(id => state.foods.find(f => f.id === id)).filter(Boolean);
    let totK=0,totP=0,totG=0,totL=0,totF=0;
    foods.forEach(f => { totK+=f.kcal; totP+=f.prot; totG+=f.gluc; totL+=f.lip; totF+=f.fib; });
    return `<div class="meal-card">
      <div class="meal-header">
        <div class="meal-time">${m.name || "Repas"}</div>
        <button class="icon-btn" onclick="editMeal('${m.id}')">✎</button>
      </div>
      <div class="meal-items">
        ${foods.map(f => `<span class="meal-chip">${f.name}</span>`).join('') || '<span style="color:var(--text3);font-size:12px">Aucun aliment</span>'}
      </div>
      <div class="meal-totals">
        <span><span class="meal-total-val">${Math.round(totK)}</span> kcal</span>
        <span>P <span class="meal-total-val">${totP.toFixed(1)}</span>g</span>
        <span>G <span class="meal-total-val">${totG.toFixed(1)}</span>g</span>
        <span>L <span class="meal-total-val">${totL.toFixed(1)}</span>g</span>
        <span>F <span class="meal-total-val">${totF.toFixed(1)}</span>g</span>
      </div>
    </div>`;
  }).join('');
}

function renderDayBalance(todayMeals) {
  // Calcul des totaux du jour
  let counts = { feculent:0, proteine:0, legume:0, fruit:0 };
  let totK=0, totP=0, totFib=0;
  todayMeals.forEach(m => {
    m.foodIds.forEach(id => {
      const f = state.foods.find(x => x.id === id);
      if (!f) return;
      if (counts[f.cat] !== undefined) counts[f.cat]++;
      // Un plat complet compte comme légume + féculent + protéine
      if (f.cat === "plat") {
        counts.feculent++;
        counts.proteine++;
        counts.legume++;
      }
      totK += f.kcal; totP += f.prot; totFib += f.fib;
    });
  });
  // Cibles indicatives par jour (couverture des catégories)
  const targets = { feculent:3, proteine:3, legume:5, fruit:2 };
  const labels = { feculent:"Féculents", proteine:"Protéines", legume:"Légumes", fruit:"Fruits" };
  const colors = { feculent:"var(--cat-feculent)", proteine:"var(--cat-proteine)", legume:"var(--cat-legume)", fruit:"var(--cat-fruit)" };

  let html = `<div class="card-label">Équilibre du jour</div>`;
  ["feculent","proteine","legume","fruit"].forEach(k => {
    const pct = Math.min(100, (counts[k] / targets[k]) * 100);
    html += `<div class="balance-row">
      <div class="balance-label" style="color:${colors[k]}">${labels[k]}</div>
      <div class="balance-bar-wrap"><div class="balance-bar" style="width:${pct}%;background:${colors[k]}"></div></div>
      <div class="balance-status" style="color:${pct>=100?'var(--green)':'var(--text2)'}">${counts[k]}/${targets[k]}</div>
    </div>`;
  });
  html += `<div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--border);display:flex;justify-content:space-between;font-size:12px;color:var(--text2)">
    <span>Total : <span style="color:var(--text);font-weight:700">${Math.round(totK)}</span> kcal</span>
    <span>Prot : <span style="color:var(--text);font-weight:700">${totP.toFixed(0)}</span>g</span>
    <span>Fibres : <span style="color:var(--text);font-weight:700">${totFib.toFixed(0)}</span>g</span>
  </div>`;
  document.getElementById('day-balance').innerHTML = html;
}

/* Modal repas */
function openMealModal() {
  state.editingMealId = null;
  state.currentMealFoods = [];
  document.getElementById('meal-id').value = "";
  document.getElementById('meal-name').value = "";
  document.getElementById('meal-food-search').value = "";
  document.getElementById('meal-delete-btn').style.display = "none";
  renderMealChips();
  document.getElementById('meal-modal').classList.add('open');
}

function editMeal(id) {
  const m = state.meals.find(x => x.id === id);
  if (!m) return;
  state.editingMealId = id;
  state.currentMealFoods = [...m.foodIds];
  document.getElementById('meal-id').value = id;
  document.getElementById('meal-name').value = m.name || "";
  document.getElementById('meal-food-search').value = "";
  document.getElementById('meal-delete-btn').style.display = "block";
  renderMealChips();
  document.getElementById('meal-modal').classList.add('open');
}

function closeMealModal() {
  document.getElementById('meal-modal').classList.remove('open');
}

function renderMealChips() {
  const c = document.getElementById('meal-food-chips');
  if (state.currentMealFoods.length === 0) {
    c.innerHTML = '<span style="color:var(--text3);font-size:12px;align-self:center">Aucun aliment ajouté</span>';
    return;
  }
  c.innerHTML = state.currentMealFoods.map((id,idx) => {
    const f = state.foods.find(x => x.id === id);
    if (!f) return '';
    return `<span class="meal-chip">${f.name} <span class="meal-chip-x" onclick="removeMealFood(${idx})">✕</span></span>`;
  }).join('');
}

function removeMealFood(idx) {
  state.currentMealFoods.splice(idx, 1);
  renderMealChips();
}

document.getElementById('meal-food-search').addEventListener('input', (e) => {
  renderSearchResults(e.target.value, 'meal-food-results', (id) => {
    state.currentMealFoods.push(id);
    document.getElementById('meal-food-search').value = "";
    renderMealChips();
  });
});
document.getElementById('meal-food-search').addEventListener('blur', () => {
  setTimeout(() => {
    document.getElementById('meal-food-results').classList.remove('open');
  }, 200);
});

function saveMeal() {
  const name = document.getElementById('meal-name').value.trim() || "Repas";
  if (state.editingMealId) {
    const i = state.meals.findIndex(m => m.id === state.editingMealId);
    if (i >= 0) {
      state.meals[i].name = name;
      state.meals[i].foodIds = [...state.currentMealFoods];
    }
  } else {
    state.meals.push({
      id: "m_" + Date.now(),
      name,
      date: todayKey(),
      foodIds: [...state.currentMealFoods],
    });
  }
  saveState();
  closeMealModal();
  renderMeals();
}

function deleteMeal() {
  if (!state.editingMealId) return;
  if (!confirm("Supprimer ce repas ?")) return;
  state.meals = state.meals.filter(m => m.id !== state.editingMealId);
  saveState();
  closeMealModal();
  renderMeals();
}

/* ═══════════════════════════════════════════════════════════════════
   RÉGLAGES : EXPORT / IMPORT
═══════════════════════════════════════════════════════════════════ */
function exportData() {
  const data = JSON.stringify({ foods: state.foods, meals: state.meals }, null, 2);
  navigator.clipboard.writeText(data).then(() => {
    showSettingsMsg("Données copiées dans le presse-papier ✓");
  }).catch(() => {
    // fallback
    const ta = document.createElement('textarea');
    ta.value = data; document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); showSettingsMsg("Données copiées ✓"); }
    catch(e) { alert("Impossible de copier. Voici les données :\n\n" + data); }
    document.body.removeChild(ta);
  });
}

function openImportBox() {
  const box = document.getElementById('import-box');
  box.style.display = box.style.display === 'none' ? 'block' : 'none';
}

function importFromText() {
  const txt = document.getElementById('import-text').value.trim();
  if (!txt) return;
  try {
    const data = JSON.parse(txt);
    if (data.foods) state.foods = data.foods;
    if (data.meals) state.meals = data.meals;
    saveState();
    showSettingsMsg("Données importées ✓");
    document.getElementById('import-text').value = "";
    document.getElementById('import-box').style.display = "none";
  } catch(e) {
    alert("Format invalide. Vérifie le texte collé.");
  }
}

function resetDatabase() {
  if (!confirm("Réinitialiser la base d'aliments à sa version d'origine ? Tes ajouts personnels seront perdus.")) return;
  state.foods = DEFAULT_FOODS.map((f, i) => ({ ...f, id: "f_" + i + "_" + Date.now() }));
  saveState();
  showSettingsMsg("Base réinitialisée ✓");
  renderBase();
}

function showSettingsMsg(msg) {
  const el = document.getElementById('settings-msg');
  el.textContent = msg;
  el.style.display = "block";
  setTimeout(() => { el.style.display = "none"; }, 2500);
}

function openSettingsModal() {
  document.getElementById('settings-modal').classList.add('open');
}
function closeSettingsModal() {
  document.getElementById('settings-modal').classList.remove('open');
}

function forceReload() {
  location.reload(true);
}
